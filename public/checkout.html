<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access — Legend Speak</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-legend: #c5a059;
            --blue-deep: #1e293b;
            --bg-archive: #f4f1ea;
            --text-main: #33302c;
        }
        body { 
            background: var(--bg-archive); 
            font-family: 'EB Garamond', serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            color: var(--text-main);
        }
        .checkout-box { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 450px; 
            border: 1px solid rgba(197,160,89,0.25); 
        }
        .logo { 
            text-align: center; 
            color: var(--gold-legend); 
            font-family: 'Cinzel'; 
            font-size: 24px; 
            margin-bottom: 10px; 
            letter-spacing: 2px;
        }
        .logo-mark {
            width: 50px;
            height: 50px;
            background: var(--blue-deep);
            border: 2px solid var(--gold-legend);
            border-radius: 50%;
            display: grid;
            place-items: center;
            margin: 0 auto 15px;
            color: var(--gold-legend);
            font-weight: bold;
        }
        h2 { 
            text-align: center; 
            font-family: 'Cinzel'; 
            font-size: 20px; 
            color: var(--blue-deep); 
            margin-bottom: 30px; 
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }
        #payment-element { margin-bottom: 24px; }
        .btn {
            background: var(--gold-legend);
            color: white;
            font-family: 'Cinzel';
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { background: #b08d4a; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #error-message { color: #be123c; text-align: center; margin-top: 15px; font-size: 15px; }
.fake-payment-fields label {
    display: block;
    margin-bottom: 6px;
    color: var(--blue-deep);
    font-size: 14px;
}

.fake-payment-fields input,
.fake-payment-fields select {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 15px;
}

.row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}
        .back-link { 
            display: block; 
            text-align: center; 
            margin-top: 25px; 
            color: #64748b; 
            text-decoration: none; 
            font-size: 14px; 
            font-family: 'Cinzel';
        }
        .back-link:hover { color: var(--gold-legend); }
    </style>
</head>
<body>
    <div class="checkout-box">
        <div class="logo-mark">L</div>
        <div class="logo">Legend Speak</div>
        <h2>Secure Archive Access</h2>
        
        <form id="payment-form">
            <div class="fake-payment-fields">
  <label>Card Number</label>
  <input type="text" placeholder="1234 1234 1234 1234" inputmode="numeric">

  <div class="row">
    <div>
      <label>Expiry Date</label>
      <input type="text" placeholder="MM / YY" inputmode="numeric">
    </div>
    <div>
      <label>CVC</label>
      <input type="text" placeholder="CVC" inputmode="numeric">
    </div>
  </div>

  <label>Name on Card</label>
  <input type="text" placeholder="Full name">

  <label>Billing Country</label>
  <select>
    <option>United Kingdom</option>
    <option>United States</option>
    <option>Canada</option>
    <option>Australia</option>
    <option>European Union</option>
  </select>

  <div style="margin-top:10px;margin-bottom:15px;">
    <img src="https://static.vecteezy.com/system/resources/previews/020/975/572/original/visa-logo-visa-icon-transparent-free-png.png"
         alt="Visa"
         style="height:28px;margin-right:15px;vertical-align:middle;">

    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg"
         alt="MasterCard"
         style="height:28px;vertical-align:middle;">
  </div>
</div>

<button id="submit" class="btn">Confirm Access</button>
<div id="error-message"></div>
        </form>

        <a href="/pricing.html" class="back-link">Return to Tiers</a>
    </div>

    <script>
const params = new URLSearchParams(window.location.search);
const plan = params.get('plan');
const token = localStorage.getItem("jwt");

const titles = {
  god: "Historical Tier",
  all: "Legendary Tier",
  lifetime: "Lifetime Access"
};

const prices = {
  god: "$29.95",
  all: "$35.95",
  lifetime: "$49.95"
};

if (plan && titles[plan]) {
  document.querySelector("h2").innerText = titles[plan] + " — " + prices[plan];
}

document.querySelector("#payment-form").addEventListener("submit", function(e) {
  e.preventDefault();
  document.getElementById("error-message").innerText =
    "Demo checkout only — payment processing will be activated soon.";
});

if (!token) {
  alert("Please sign in to access the archives.");
  window.location.href = "/";
} else if (!plan) {
  alert("No tier selected.");
  window.location.href = "/pricing.html";
}
</script>
</body>
</html>

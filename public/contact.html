<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — LegendSpeak</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'EB Garamond', serif;
  background: #fdfcfb;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.box {
  background: white;
  padding: 40px;
  border-radius: 15px;
  width: 100%;
  max-width: 500px;
  box-shadow: 0 15px 50px rgba(0,0,0,0.05);
  border: 1px solid rgba(197,160,89,0.2);
}

.logo {
  text-align: center;
  font-family: 'Cinzel';
  font-size: 28px;
  color: #c5a059;
  margin-bottom: 20px;
}

h2 {
  text-align: center;
  font-family: 'Cinzel';
  color: #2c3e50;
  margin-bottom: 10px;
}

p {
  text-align: center;
  color: #8a8276;
  margin-bottom: 30px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 15px;
}

textarea {
  resize: vertical;
  min-height: 120px;
}

button {
  width: 100%;
  padding: 14px;
  background: #c5a059;
  border: none;
  color: white;
  font-family: 'Cinzel';
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #b38f4d;
}

#msg {
  margin-top: 15px;
  text-align: center;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="box">
  <div class="logo">LegendSpeak</div>
  <h2>Contact Us</h2>
  <p>We’re here to help you.</p>

  <form id="contactForm">
    <input type="text" id="name" placeholder="Your name" required>
    <input type="email" id="email" placeholder="Your email" required>
    <textarea id="message" placeholder="Your message" required></textarea>

    <button type="submit">Send Message</button>
  </form>

  <div id="msg"></div>
</div>

<script>
document.getElementById("contactForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  const res = await fetch("/api/contact", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, email, message })
  });

  const data = await res.json();

  if (data.ok) {
    document.getElementById("msg").innerText = "Message sent successfully.";
  } else {
    document.getElementById("msg").innerText = "Error sending message.";
  }
});
</script>

</body>
</html>
